<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💖 Love Page 💖</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Quicksand:wght@400;600&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Quicksand';
  background:linear-gradient(135deg,#ff9a9e,#fad0c4,#fbc2eb,#a18cd1);
  background-size:400% 400%;
  animation:gradientMove 10s infinite;
  text-align:center;
  color:white;
  overflow:hidden;
}

/* PAGE */
.page{
  position:absolute;
  width:100%;
  top:0;
  left:0;
  opacity:0;
  transform:translateX(50px);
  transition:0.5s;
  pointer-events:none;
}
.page.active{
  opacity:1;
  transform:translateX(0);
  pointer-events:auto;
}

/* TITLE */
h1{
  font-family:'Great Vibes';
  font-size:40px;
}

/* INPUT */
input{
  padding:10px;
  border-radius:10px;
  border:none;
  width:80%;
}

/* BUTTON */
button{
  padding:10px 15px;
  border:none;
  border-radius:10px;
  background:#ff4da6;
  color:white;
  margin:10px;
}

/* MEME */
.meme{
  width:150px;
  margin-top:15px;
  animation:bounce 2s infinite;
}

/* ANIMATION */
@keyframes gradientMove{
  0%{background-position:0% 50%;}
  50%{background-position:100% 50%;}
  100%{background-position:0% 50%;}
}
@keyframes bounce{
  50%{transform:translateY(-10px);}
}
@keyframes fall{
  from{transform:translateY(-10vh);}
  to{transform:translateY(110vh);}
}
</style>
</head>

<body>

<!-- PAGE 1 -->
<div class="page active" id="p1">
  <h1>💖 Chào người em yêu 💖</h1>
  <img class="meme" id="meme">
  <button onclick="next('p2')">Bắt đầu 💘</button>
</div>

<!-- PAGE 2 -->
<div class="page" id="p2">
  <h1>Anh có thương em không?</h1>
  <img class="meme" id="meme">
  <button onclick="next('p3')">Có 💖</button>
  <button onclick="next('p3')">Không dám 😏</button>
</div>

<!-- PAGE 3 -->
<div class="page" id="p3">
  <h1>Dạo này anh thấy sao?</h1>
  <img class="meme" id="meme">
  <input id="q1">
  <button onclick="next('p4')">➡️</button>
</div>

<!-- PAGE 4 -->
<div class="page" id="p4">
  <h1>Anh thích ăn gì nhất?</h1>
  <img class="meme" id="meme">
  <input id="q2">
  <button onclick="next('p5')">➡️</button>
</div>

<!-- PAGE 5 -->
<div class="page" id="p5">
  <h1>Anh muốn làm gì nhất?</h1>
  <img class="meme" id="meme">
  <input id="q3">
  <button onclick="next('p6')">➡️</button>
</div>

<!-- PAGE 6 -->
<div class="page" id="p6">
  <h1>Anh muốn được tặng gì?</h1>
  <img class="meme" id="meme">
  <input id="q4">
  <button onclick="next('p7')">➡️</button>
</div>

<!-- PAGE 7 -->
<div class="page" id="p7">
  <h1>Điều gì làm anh phiền lòng?</h1>
  <img class="meme" id="meme">
  <input id="q5">
  <button onclick="sendData(); next('p8')">💌 Gửi</button>
</div>

<!-- PAGE 8 -->
<div class="page" id="p8">
  <h1>💖 Em sẽ cố gắng tốt hơn 💖</h1>
  <p>I love you 💘</p>
  <img class="meme" id="meme">
  <button onclick="next('p1')">🔄 Làm lại</button>
</div>

<script>

// MEME
const memes={
 p1:"https://media.giphy.com/media/JIX9t2j0ZTN9S/giphy.gif",
 p2:"https://media.giphy.com/media/3oriO0OEd9QIDdllqo/giphy.gif",
 p3:"https://media.giphy.com/media/mlvseq9yvZhba/giphy.gif",
 p4:"https://media.giphy.com/media/ICOgUNjpvO0PC/giphy.gif",
 p5:"https://media.giphy.com/media/26ufdipQqU2lhNA4g/giphy.gif",
 p6:"https://media.giphy.com/media/JIX9t2j0ZTN9S/giphy.gif",
 p7:"https://media.giphy.com/media/mlvseq9yvZhba/giphy.gif",
 p8:"https://media.giphy.com/media/3oriO0OEd9QIDdllqo/giphy.gif"
};

// NEXT PAGE (mượt)
function next(id){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  let page=document.getElementById(id);
  page.classList.add('active');

  // set meme
  page.querySelector("#meme").src=memes[id];
}

// TIM CLICK
document.addEventListener("click",e=>{
  let heart=document.createElement("div");
  heart.innerHTML="💖";
  heart.style.position="fixed";
  heart.style.left=e.clientX+"px";
  heart.style.top=e.clientY+"px";
  heart.style.fontSize="20px";
  document.body.appendChild(heart);

  let up=setInterval(()=>{
    heart.style.top=(parseInt(heart.style.top)-5)+"px";
    if(parseInt(heart.style.top)<0){
      heart.remove();
      clearInterval(up);
    }
  },30);
});

// TIM RƠI
setInterval(()=>{
  let h=document.createElement("div");
  h.innerHTML=["💖","💕","💘"][Math.floor(Math.random()*3)];
  h.style.position="fixed";
  h.style.left=Math.random()*100+"vw";
  h.style.fontSize="20px";
  h.style.animation="fall 5s linear";
  document.body.appendChild(h);
  setTimeout(()=>h.remove(),5000);
},300);

// GOOGLE FORM
const FORM="https://docs.google.com/forms/d/e/1FAIpQLSdYuCVEM7QCvCqjvtUc6SuVrNW1flerqN3PaKQ4poPHXj2uIA/formResponse";

function sendData(){
  let data=new FormData();
  data.append("entry.137169317", q1.value);
  data.append("entry.454111835", q2.value);
  data.append("entry.1872124055", q3.value);
  data.append("entry.669638336", q4.value);
  data.append("entry.559059606", q5.value);

  fetch(FORM,{
    method:"POST",
    mode:"no-cors",
    body:data
  });
}

</script>

</body>
</html>
