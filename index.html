<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💖 Messenger Love 💖</title>

<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Quicksand';
  background:#f0f2f5;
}

/* APP */
.app{
  max-width:400px;
  margin:auto;
  height:100vh;
  display:flex;
  flex-direction:column;
  background:white;
}

/* HEADER */
.header{
  background:#0084ff;
  color:white;
  padding:12px;
  font-weight:bold;
}

/* CHAT */
.chat{
  flex:1;
  overflow-y:auto;
  padding:10px;
  display:flex;
  flex-direction:column;
}

/* MESSAGE */
.msg{
  background:#e4e6eb;
  padding:8px 12px;
  border-radius:18px;
  margin:5px 0;
  max-width:70%;
  align-self:flex-start;
  position:relative;
  animation:fadeIn 0.3s;
}

/* REACTION */
.react{
  font-size:14px;
  margin-left:10px;
}

/* INPUT AREA */
.inputArea{
  padding:10px;
  border-top:1px solid #ccc;
}

input{
  width:70%;
  padding:8px;
  border-radius:20px;
  border:1px solid #ccc;
}

button{
  padding:8px 12px;
  border:none;
  border-radius:20px;
  background:#0084ff;
  color:white;
}

/* TYPING */
.typing{
  font-size:14px;
  color:gray;
  margin:5px;
}

/* ANIM */
@keyframes fadeIn{
  from{opacity:0;transform:translateY(10px);}
  to{opacity:1;}
}
</style>
</head>

<body>

<div class="app">

  <div class="header">💖 Người yêu 💖</div>

  <div class="chat" id="chat"></div>

  <div class="inputArea">
    <input id="input" placeholder="Nhắn gì đó...">
    <button onclick="send()">Gửi</button>
  </div>

</div>

<script>

// CHAT SCRIPT
let step=0;

const script=[
 "Chào anh 💖",
 "Anh có thương em không?",
 "Dạo này anh thấy sao?",
 "Anh thích ăn gì nhất?",
 "Anh muốn làm gì nhất?",
 "Anh muốn quà gì?",
 "Có gì làm anh buồn không?",
 "Em yêu anh nhiều lắm 💘"
];

// GOOGLE FORM
const FORM="https://docs.google.com/forms/d/e/1FAIpQLSdYuCVEM7QCvCqjvtUc6SuVrNW1flerqN3PaKQ4poPHXj2uIA/formResponse";

// HIỆN TIN NHẮN
function bot(msg){
  let div=document.createElement("div");
  div.className="msg";
  div.innerHTML=msg + `<div class="react">❤️ 😆 😢</div>`;
  chat.appendChild(div);
  chat.scrollTop=chat.scrollHeight;
}

// TYPING
function typing(callback){
  let t=document.createElement("div");
  t.className="typing";
  t.innerText="Đang nhập...";
  chat.appendChild(t);
  chat.scrollTop=chat.scrollHeight;

  setTimeout(()=>{
    t.remove();
    callback();
  },1000);
}

// SEND USER
function send(){
  let val=input.value;
  if(!val) return;

  let div=document.createElement("div");
  div.className="msg";
  div.style.alignSelf="flex-end";
  div.style.background="#0084ff";
  div.style.color="white";
  div.innerText=val;

  chat.appendChild(div);
  input.value="";
  chat.scrollTop=chat.scrollHeight;

  save(val);

  step++;
  if(step<script.length){
    typing(()=>bot(script[step]));
  } else {
    sendForm();
  }
}

// SAVE DATA
let answers=[];
function save(val){
  answers.push(val);
}

// SEND FORM
function sendForm(){
  let data=new FormData();
  data.append("entry.137169317", answers[0]||"");
  data.append("entry.454111835", answers[1]||"");
  data.append("entry.1872124055", answers[2]||"");
  data.append("entry.669638336", answers[3]||"");
  data.append("entry.559059606", answers[4]||"");

  fetch(FORM,{
    method:"POST",
    mode:"no-cors",
    body:data
  });

  typing(()=>bot("Em đã nhận được rồi 💖"));
}

// INIT
typing(()=>bot(script[0]));

</script>

</body>
</html>
